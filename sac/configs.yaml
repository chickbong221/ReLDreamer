# SAC trainer config. Mirrors dreamerv3/configs.yaml structure:
#   defaults -> base values
#   <preset name> -> additive overrides selected via --configs <name>
#
# CLI: python -m sac.main --task maniskill_PickCube-v1 --configs maniskill_rgb
#      python -m sac.main --task maniskill_PickSubtaskTrain-v0 --configs mshab
#                          --env.maniskill.mshab_task pick

defaults:

  logdir: logdir/{timestamp}       # relative -> resolved against sac/ in main.py
  replica: 0
  replicas: 1
  task: maniskill_PickCube-v1
  seed: 1
  script: train

  agent:
    gamma: 0.8
    tau: 0.01
    batch_size: 1024
    buffer_size: 1_000_000
    learning_starts: 4_000
    policy_lr: 3e-4
    q_lr: 3e-4
    alpha_lr: 3e-4
    alpha: 0.2
    autotune: True                 # learn entropy temperature
    target_entropy: auto           # 'auto' = -prod(act_shape); or a float
    policy_frequency: 1
    target_network_frequency: 1
    training_freq: 64              # env steps per gradient block
    utd: 0.5                       # gradient updates per env step
    bootstrap_at_done: always      # 'always' | 'truncated' | 'never'
    log_std_min: -5.0
    log_std_max: 2.0
    encoder:
      out_dim: 256
      mlp_hidden: [512, 256]
      detach_critic_encoder: False  # detach encoder grad through critic only
      critic_layer_norm: False       # LayerNorm inside critic hidden layers

  env:
    maniskill:
      num_envs: 16
      num_eval_envs: 16
      obs_mode: state              # 'state' | 'rgb' | 'depth'
      include_state: True          # also concat proprio state to encoder out
      sim_backend: gpu
      control_mode: pd_joint_delta_pos
      image_size: 64
      reconfiguration_freq: 0      # 0 = never; 1 = every reset
      eval_reconfiguration_freq: 1
      reward_mode: normalized_dense
      # MS-HAB only (ignored otherwise):
      mshab_task: none             # 'none' | 'pick' | 'place' | 'open' | 'close'
      mshab_split: train
      mshab_obj: all
      mshab_stationary_head: True
      max_episode_steps: 0         # 0 = registered default
      eval_max_episode_steps: 0    # 0 = reuse max_episode_steps

  run:
    total_steps: 1_000_000
    log_every: 5_000
    eval_every: 50_000
    eval_steps: 50                 # rollout length per eval env
    save_every: 200_000

  logger:
    outputs: [wandb]
    wandb_project: RelRL
    wandb_entity: letuanhf-hanoi-university-of-science-and-technology
    wandb_group: na
    wandb_name: 'sac-mshab'

  graph:
    enabled: False
    profile: tabletop              # teemo_sim_probe profile (thresholds.yaml)
    thresholds_path: null          # override teemo thresholds.yaml (null = default)
    whitelist_dir: null            # override teemo whitelists.dir (null = default)
    camera: fetch_hand             # camera name for segmentation reads
    n_slots: 10                    # object slots; N_max = n_slots + 1 (+1 ee)
    k_persist: 5                   # persistence horizon
    k_soft: 5.0                    # alpha = exp(-tau / k_soft)
    e_max: 256                     # edge cap after priority truncation
    embed_dim: 64
    hidden_dim: 256
    out_dim: 128
    num_layers: 2

# ----------------------------------------------------------------------- #
# Presets
# ----------------------------------------------------------------------- #

maniskill_state:
  env:
    maniskill:
      obs_mode: state
      num_envs: 16
  agent:
    batch_size: 1024

maniskill_rgb:
  env:
    maniskill:
      obs_mode: rgb
      num_envs: 16
      image_size: 64
  agent:
    batch_size: 512               # CNN encoder makes RGB updates heavier

mshab:
  env:
    maniskill:
      obs_mode: depth
      num_envs: 16
      mshab_task: pick
      mshab_split: train
      mshab_obj: all
      max_episode_steps: 100
      eval_max_episode_steps: 200
      reward_mode: normalized_dense
  agent:
    gamma: 0.9                    # matches mshab/train_sac.py
    batch_size: 512
    buffer_size: 1_000_000
  run:
    total_steps: 50_000_000

mshab_graph:
  env:
    maniskill:
      obs_mode: rgb
      num_envs: 16
      mshab_task: pick
      mshab_split: train
      mshab_obj: all
      max_episode_steps: 100
      eval_max_episode_steps: 200
      reward_mode: normalized_dense
  agent:
    gamma: 0.9
    batch_size: 512
    buffer_size: 500_000          # graph tensors inflate per-transition storage
  run:
    total_steps: 50_000_000
  graph:
    enabled: True
    profile: tabletop
    camera: fetch_hand

# set_table / pick / 024_bowl -- mirrors mshab/configs/sac_pick.yml (depth,
# both cameras, head stationary, 189 envs, 1M replay, batch 512) minus its
# frame stacking. Add --graph.enabled True to attach the oracle scene graph
# (requires teemo assets, see README).
pick_bowl:
  env:
    maniskill:
      obs_mode: depth
      num_envs: 189
      num_eval_envs: 63
      mshab_task: set_table
      mshab_obj: 024_bowl
      mshab_split: train
      mshab_stationary_head: True
      max_episode_steps: 100
      eval_max_episode_steps: 200
      reward_mode: normalized_dense
  agent:
    gamma: 0.9
    tau: 0.005                    # mshab critic_tau
    batch_size: 512
    buffer_size: 500_000
    learning_starts: 5_000        # mshab init_steps
    alpha: 0.1                    # mshab init_temperature
    policy_frequency: 2           # mshab actor_update_freq
    target_network_frequency: 2   # mshab critic_target_update_freq
    log_std_min: -20.0            # mshab actor_log_std_min
    encoder:
      mlp_hidden: [256, 256, 256] # mshab actor/critic hidden_dims
      critic_layer_norm: True     # mshab critic_layer_norm
  run:
    total_steps: 50_000_000
  graph:
    profile: room_scale
    camera: fetch_head
  logger:
    wandb_name: 'sac-set_table-pick-024_bowl-depth'
