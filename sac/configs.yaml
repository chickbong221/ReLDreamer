# SAC trainer config. defaults + named presets selected via --configs <name>.
# CLI: python -m sac.main --configs pick_bowl --task maniskill_PickSubtaskTrain-v0

defaults:

  logdir: logdir/{timestamp}
  replica: 0
  replicas: 1
  task: maniskill_PickSubtaskTrain-v0
  seed: 1
  script: train

  agent:
    gamma: 0.9
    batch_size: 512
    buffer_size: 500_000
    init_steps: 5_000
    init_temperature: 0.1

    actor_lr: 3.0e-4
    critic_lr: 3.0e-4
    alpha_lr: 3.0e-4
    actor_beta: 0.9
    critic_beta: 0.9
    alpha_beta: 0.9

    actor_hidden_dims: [256, 256, 256]
    actor_update_freq: 2
    log_std_min: -20.0
    log_std_max: 2.0

    critic_hidden_dims: [256, 256, 256]
    critic_layer_norm: True
    critic_dropout: null
    critic_tau: 0.005
    critic_encoder_tau: 0.005
    critic_target_update_freq: 2

    cnn_features: [32, 64, 128, 256]
    cnn_filters: [3, 3, 3, 3]
    cnn_strides: [2, 2, 2, 2]
    cnn_padding: valid
    encoder_pixels_feature_dim: 50
    encoder_state_feature_dim: 50

  env:
    maniskill:
      num_envs: 16
      num_eval_envs: 16
      sim_backend: gpu
      control_mode: pd_joint_delta_pos
      image_size: 128
      frame_stack: 3
      reconfiguration_freq: 0
      eval_reconfiguration_freq: 0
      reward_mode: normalized_dense
      nonprivileged_obs: True
      mshab_task: pick
      mshab_split: train
      mshab_eval_split: val
      mshab_obj: all
      mshab_num_build_configs: 32  # 0 → all; positive → first N distinct build configs (sorted), train split only
      mshab_stationary_head: True
      max_episode_steps: 100
      eval_max_episode_steps: 200
      robot_force_mult: 0.001
      robot_force_penalty_min: 0.2

  run:
    total_steps: 50_000_000
    log_every: 10_000
    eval_every: 1_000_000
    save_every: 200_000_000

  logger:
    outputs: [wandb]
    wandb_project: RelRL
    wandb_entity: letuanhf-hanoi-university-of-science-and-technology
    wandb_group: na
    wandb_name: 'sac-mshab'

  graph:
    enabled: False
    bypass_teemo: False
    profile: room_scale
    thresholds_path: null
    whitelist_dir: null
    cameras: [fetch_head, fetch_hand]
    n_slots: 10
    k_persist: 5
    k_soft: 5.0
    e_max: 256
    embed_dim: 64
    hidden_dim: 512
    out_dim: 128
    num_layers: 2
    staleness_enabled: True
    actor_gradient: False

# ----------------------------------------------------------------------- #
# Presets
# ----------------------------------------------------------------------- #

pick_bowl:
  env:
    maniskill:
      num_envs: 189
      num_eval_envs: 21
      mshab_task: set_table
      mshab_obj: 024_bowl
      mshab_num_build_configs: 32
  graph:
    profile: room_scale
    camera: fetch_head
  logger:
    wandb_name: 'sac-set_table-pick-024_bowl-depth'
