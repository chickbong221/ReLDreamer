# TEEMO sim-probe thresholds. Two scale profiles:
#   tabletop   -> ManiSkill PickCube-v1 (small workspace)
#   room_scale -> MS-HAB (Fetch navigates room-scale scenes)
#
# All distances in metres. Bin edges are upper-exclusive ascending.

temporal:
  K: 5

contact:
  eps_force: 0.05

grasp:
  max_angle: 30
  tcp_approach_axis_local: [0.0, 0.0, 1.0]

support:
  eps_z: 0.02
  min_vertical_force_ratio: 0.5

affordances:
  asset_path: affordances.json

e_domain:
  asset_path: e_domain.json
  enable_local_contact: true       # R7

selection:                          # R8-R13
  n_slots: 10                       # R11 object slot capacity
  n_refresh: 2                      # R11 refresh quota
  k_persist: 5                      # R8 / R13 persistence window (frames)
  oracle_force_active_target: false # R13 ablation only
  weights:                          # R10 continuous rule score
    contact:  4.0
    grasp:    4.0
    persist:  2.0
    afford:   1.5
    state:    1.5
    support:  1.0
    local:    2.0
    dist:     2.0
  tau_age:  3
  tau_dist_tabletop:   0.5
  tau_dist_room_scale: 1.5

profiles:

  tabletop:
    planar_distance:
      edges:  [0.03, 0.08, 0.20, 0.50]
      labels: [very-near, near, medium, far, very-far]
    height_offset:
      edges:  [-0.10, -0.03, 0.03, 0.10]
      labels: [far-below, below, level, above, far-above]
    orientation_alignment:
      edges:  [0.17, 0.52, 1.05, 1.57]
      labels: [aligned, near-aligned, partial, misaligned, very-misaligned]
    planar_distance_change:
      edges:  [-0.10, -0.04, -0.01, 0.01, 0.04, 0.10]
      labels: [approach-fast, approach-medium, approach-slow,
               stable-distance,
               recede-slow, recede-medium, recede-fast]
    height_offset_change:
      edges:  [-0.10, -0.04, -0.01, 0.01, 0.04, 0.10]
      labels: [move-down-fast, move-down-medium, move-down-slow,
               stable-height,
               move-up-slow, move-up-medium, move-up-fast]
    orientation_alignment_change:
      edges:  [-0.35, -0.12, -0.03, 0.03, 0.12, 0.35]
      labels: [improve-alignment-fast, improve-alignment-medium, improve-alignment-slow,
               stable-alignment,
               worsen-alignment-slow, worsen-alignment-medium, worsen-alignment-fast]

  room_scale:
    planar_distance:
      edges:  [0.05, 0.20, 0.75, 2.00]
      labels: [very-near, near, medium, far, very-far]
    height_offset:
      edges:  [-0.10, -0.03, 0.03, 0.10]
      labels: [far-below, below, level, above, far-above]
    orientation_alignment:
      edges:  [0.17, 0.52, 1.05, 1.57]
      labels: [aligned, near-aligned, partial, misaligned, very-misaligned]
    planar_distance_change:
      edges:  [-0.30, -0.12, -0.03, 0.03, 0.12, 0.30]
      labels: [approach-fast, approach-medium, approach-slow,
               stable-distance,
               recede-slow, recede-medium, recede-fast]
    height_offset_change:
      edges:  [-0.10, -0.04, -0.01, 0.01, 0.04, 0.10]
      labels: [move-down-fast, move-down-medium, move-down-slow,
               stable-height,
               move-up-slow, move-up-medium, move-up-fast]
    orientation_alignment_change:
      edges:  [-0.35, -0.12, -0.03, 0.03, 0.12, 0.35]
      labels: [improve-alignment-fast, improve-alignment-medium, improve-alignment-slow,
               stable-alignment,
               worsen-alignment-slow, worsen-alignment-medium, worsen-alignment-fast]
