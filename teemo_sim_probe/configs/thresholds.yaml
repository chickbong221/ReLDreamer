# TEEMO sim-probe thresholds. Two scale profiles:
#   tabletop   -> ManiSkill PickCube-v1 (small workspace)
#   room_scale -> MS-HAB (Fetch navigates room-scale scenes)
#
# All distances in metres. Bin edges are upper-exclusive ascending; the label
# for the last bin applies to everything >= its lower edge.

temporal:
  K: 5                       # horizon for temporal labels (frames)

contact:
  eps_force: 0.05            # N; |pairwise force| above this == contact

grasp:
  max_angle: 30             # MS-HAB convention for agent.is_grasping

support:
  eps_z: 0.02               # m; supporter centre must be lower by this amount
  min_vertical_force_ratio: 0.5  # |Fz| / |F|; rejects side-only contact

affordances:
  # JSON asset produced by tools/build_affordances.py. Path is resolved
  # relative to THIS file's directory. Missing file -> empty set + warning;
  # affordance relations are silently skipped (graceful degradation).
  asset_path: affordances.json

persistence:                # MS-HAB only; non-MS-HAB envs bypass this entirely
  n_max: 6                  # max object nodes (ee excluded from count)
  w_keep: 3                 # retain invisible object for up to this many frames
  w_manip: 5                # remember EE-grasp/contact for this many frames

profiles:

  tabletop:
    planar_distance:        # ee-object, |xy|
      edges:  [0.03, 0.08, 0.20, 0.50]
      labels: [very-near, near, medium, far, very-far]
    height_offset:          # ee-object, z_ee - z_obj (signed)
      edges:  [-0.10, -0.03, 0.03, 0.10]
      labels: [far-below, below, level, above, far-above]
    tcp_affordance_alignment:    # ee-active_target, |tcp - anchor_world|
      edges:  [0.01, 0.03, 0.07, 0.15]
      labels: [on-anchor, very-near, near, off, far]
    gripper_width_alignment:     # signed: width - preferred_width
      edges:  [-0.03, -0.01, 0.01, 0.03]
      labels: [much-tighter, tighter, matched, looser, much-looser]
    planar_distance_change: # signed delta over K
      edges:  [-0.10, -0.04, -0.01, 0.01, 0.04, 0.10]
      labels: [approach-fast, approach-medium, approach-slow,
               stable-distance,
               recede-slow, recede-medium, recede-fast]
    height_offset_change:
      edges:  [-0.10, -0.04, -0.01, 0.01, 0.04, 0.10]
      labels: [move-down-fast, move-down-medium, move-down-slow,
               stable-height,
               move-up-slow, move-up-medium, move-up-fast]
    tcp_affordance_alignment_change:  # signed delta distance over K
      edges:  [-0.05, -0.02, -0.005, 0.005, 0.02, 0.05]
      labels: [approach-anchor-fast, approach-anchor-medium, approach-anchor-slow,
               stable-anchor,
               leave-anchor-slow, leave-anchor-medium, leave-anchor-fast]
    gripper_width_alignment_change:   # signed delta width-error over K
      edges:  [-0.02, -0.008, -0.002, 0.002, 0.008, 0.02]
      labels: [tighten-fast, tighten-medium, tighten-slow,
               stable-width,
               loosen-slow, loosen-medium, loosen-fast]

  room_scale:
    planar_distance:
      edges:  [0.05, 0.20, 0.75, 2.00]
      labels: [very-near, near, medium, far, very-far]
    height_offset:
      edges:  [-0.10, -0.03, 0.03, 0.10]
      labels: [far-below, below, level, above, far-above]
    tcp_affordance_alignment:
      edges:  [0.02, 0.05, 0.12, 0.30]
      labels: [on-anchor, very-near, near, off, far]
    gripper_width_alignment:     # same as tabletop -- gripper is robot-local
      edges:  [-0.03, -0.01, 0.01, 0.03]
      labels: [much-tighter, tighter, matched, looser, much-looser]
    planar_distance_change:
      edges:  [-0.30, -0.12, -0.03, 0.03, 0.12, 0.30]
      labels: [approach-fast, approach-medium, approach-slow,
               stable-distance,
               recede-slow, recede-medium, recede-fast]
    height_offset_change:
      edges:  [-0.10, -0.04, -0.01, 0.01, 0.04, 0.10]
      labels: [move-down-fast, move-down-medium, move-down-slow,
               stable-height,
               move-up-slow, move-up-medium, move-up-fast]
    tcp_affordance_alignment_change:
      edges:  [-0.15, -0.06, -0.015, 0.015, 0.06, 0.15]
      labels: [approach-anchor-fast, approach-anchor-medium, approach-anchor-slow,
               stable-anchor,
               leave-anchor-slow, leave-anchor-medium, leave-anchor-fast]
    gripper_width_alignment_change:   # same as tabletop
      edges:  [-0.02, -0.008, -0.002, 0.002, 0.008, 0.02]
      labels: [tighten-fast, tighten-medium, tighten-slow,
               stable-width,
               loosen-slow, loosen-medium, loosen-fast]
